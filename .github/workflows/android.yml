name: Android Build (AAB) - API 35 + Full Diagnostics

on:
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}
      APP_VERSION_CODE: ${{ github.run_number }}

      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      ANDROIDAPI: "35"
      ANDROIDMINAPI: "24"

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4

      - name: Secret mask uygula
        shell: bash
        run: |
          set -euo pipefail
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"

      - name: Erken repo logu
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p early_diagnostics
          {
            echo "PWD=$(pwd)"
            echo "GITHUB_REF=${GITHUB_REF}"
            echo "GITHUB_SHA=${GITHUB_SHA}"
            echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_VERSION_CODE=${APP_VERSION_CODE}"
            echo ""
            echo "---- repo kok ----"
            ls -la
            echo ""
            echo "---- workflows ----"
            find .github/workflows -maxdepth 2 -type f -print -exec sed -n '1,520p' {} \; || true
            echo ""
            echo "---- settings.gradle ----"
            test -f settings.gradle && sed -n '1,220p' settings.gradle || true
            echo ""
            echo "---- root build.gradle ----"
            test -f build.gradle && sed -n '1,260p' build.gradle || true
            echo ""
            echo "---- gradle.properties ----"
            test -f gradle.properties && sed -n '1,220p' gradle.properties || true
            echo ""
            echo "---- app/build.gradle ----"
            test -f app/build.gradle && sed -n '1,520p' app/build.gradle || true
            echo ""
            echo "---- AndroidManifest.xml ----"
            test -f app/src/main/AndroidManifest.xml && sed -n '1,360p' app/src/main/AndroidManifest.xml || true
            echo ""
            echo "---- java dosyalari ----"
            find app/src/main/java -type f | sort || true
            echo ""
            echo "---- res dosyalari ----"
            find app/src/main/res -type f | sort || true
          } | tee early_diagnostics/erken_repo_logu.txt

      - name: Cache temizle
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .gradle app/build build dist_artifacts secure
          rm -rf ~/.gradle/caches ~/.gradle/daemon ~/.gradle/native
          echo "Cache temizlendi." | tee early_diagnostics/cache_temizleme.txt

      - name: Android SDK ortamını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          SDKMANAGER_BIN="$(find "$ANDROID_SDK_ROOT" -type f -name sdkmanager | sort | head -n 1 || true)"

          if [ -z "$SDKMANAGER_BIN" ] || [ ! -x "$SDKMANAGER_BIN" ]; then
            echo "HATA: sdkmanager bulunamadı." | tee early_diagnostics/sdkmanager_hatasi.txt
            exit 1
          fi

          echo "SDKMANAGER_BIN=$SDKMANAGER_BIN" >> "$GITHUB_ENV"
          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          {
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            echo "SDKMANAGER_BIN=$SDKMANAGER_BIN"
            java -version
            javac -version
            "$SDKMANAGER_BIN" --version
          } 2>&1 | tee early_diagnostics/ortam_kontrolu.txt

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$SDKMANAGER_BIN" --licenses > /dev/null || true
          "$SDKMANAGER_BIN" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" 2>&1 | tee early_diagnostics/android_platform_kurulum.txt

      - name: Kurulu Android paketlerini doğrula
        shell: bash
        run: |
          set -euxo pipefail
          {
            "$SDKMANAGER_BIN" --list | sed -n '/Installed packages:/,/Available Packages:/p' || true
            test -f "$ANDROID_SDK_ROOT/platforms/android-35/android.jar"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign"
          } 2>&1 | tee early_diagnostics/android_paket_dogrulama.txt

      - name: Repo dosyalarını kontrol et
        shell: bash
        run: |
          set -euxo pipefail

          kontrol_et() {
            if [ ! -f "$1" ]; then
              echo "HATA: Gerekli dosya bulunamadı: $1" | tee -a early_diagnostics/repo_eksik_dosya.txt
              exit 1
            fi
          }

          {
            kontrol_et settings.gradle
            kontrol_et gradle.properties
            kontrol_et build.gradle
            kontrol_et app/build.gradle
            kontrol_et app/proguard-rules.pro
            kontrol_et app/src/main/AndroidManifest.xml
            kontrol_et app/src/main/java/org/fy/kodeditoru/MainActivity.java
            kontrol_et app/src/main/java/org/fy/kodeditoru/SplashActivity.java
            kontrol_et app/src/main/res/layout/activity_main.xml
            kontrol_et app/src/main/res/values/themes.xml
            kontrol_et app/src/main/res/values/colors.xml
            kontrol_et app/src/main/res/values/dimens.xml
            kontrol_et app/src/main/res/drawable/splash_background.xml
            kontrol_et app/src/main/res/drawable/card_background.xml
            kontrol_et app/src/main/res/drawable/button_background.xml
            kontrol_et app/src/main/res/drawable/topbar_background.xml
            kontrol_et app/src/main/res/drawable/input_background.xml
            kontrol_et app/src/main/res/drawable/preview_background.xml
            kontrol_et app/src/main/res/drawable/status_badge_background.xml

            echo "Repo dosya kontrolü başarılı."
            find . -maxdepth 6 -type f | sort
          } 2>&1 | tee early_diagnostics/repo_dosya_kontrolu.txt

      - name: Release keystore oluştur
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p secure

          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "HATA: ANDROID_KEYSTORE_BASE64 secret boş." | tee early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          printf '%s' "$KEYSTORE_BASE64" > secure/release.keystore.base64

          if ! base64 --decode secure/release.keystore.base64 > secure/release.keystore 2> early_diagnostics/keystore_base64_decode_hatasi.txt; then
            echo "HATA: ANDROID_KEYSTORE_BASE64 çözülemedi." | tee early_diagnostics/keystore_hatasi.txt
            echo "Ubuntu doğru komut: base64 -w 0 release.keystore" | tee -a early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          rm -f secure/release.keystore.base64

          if [ ! -s secure/release.keystore ]; then
            echo "HATA: release.keystore boş oluştu." | tee early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          chmod 600 secure/release.keystore

          echo "ANDROID_KEYSTORE_PATH=${GITHUB_WORKSPACE}/secure/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS_PASSWORD=$KEY_ALIAS_PASSWORD" >> "$GITHUB_ENV"

          ls -lh secure/release.keystore | tee early_diagnostics/keystore_olusturma.txt

      - name: Keystore doğrula
        shell: bash
        run: |
          set -euo pipefail

          if ! keytool -list \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" 2>&1 | tee early_diagnostics/keystore_dogrulama.txt; then

            echo "HATA: Keystore doğrulanamadı. Şifre, alias veya Base64 yanlış." | tee -a early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

      - name: Gradle komutunu hazırla
        shell: bash
        run: |
          set -euxo pipefail
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

      - name: Gradle bilgisi
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD --version 2>&1 | tee early_diagnostics/gradle_bilgisi.txt

      - name: Ortam dump al
        shell: bash
        run: |
          set -euxo pipefail
          env | sort > env_dump.txt
          "$SDKMANAGER_BIN" --list > sdk_list.txt || true

      - name: Gradle clean
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD clean --stacktrace --info 2>&1 | tee build_clean.log

      - name: Release AAB derle
        shell: bash
        run: |
          set -euxo pipefail

          if ! $GRADLE_CMD :app:bundleRelease --stacktrace --info 2>&1 | tee build_aab.log; then
            echo "HATA: :app:bundleRelease başarısız oldu. Ayrıntı: build_aab.log" | tee early_diagnostics/gradle_build_hatasi.txt
            exit 1
          fi

      - name: AAB dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts/aab

          AAB_PATH="$(find app/build/outputs/bundle -type f -name '*.aab' | sort | head -n 1)"

          if [ -z "$AAB_PATH" ]; then
            echo "HATA: AAB dosyası bulunamadı." | tee early_diagnostics/aab_bulunamadi.txt
            exit 1
          fi

          cp "$AAB_PATH" "dist_artifacts/aab/mini-kod-editoru-${APP_VERSION}.aab"
          ls -lh dist_artifacts/aab | tee early_diagnostics/aab_cikti_listesi.txt

      - name: AAB imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="dist_artifacts/aab/mini-kod-editoru-${APP_VERSION}.aab"

          if ! jarsigner -verify -verbose -certs "$AAB_PATH" 2>&1 | tee early_diagnostics/aab_imza_dogrula.txt; then
            echo "HATA: AAB imza doğrulaması başarısız." | tee early_diagnostics/aab_imza_hatasi.txt
            exit 1
          fi

      - name: ReTrace eşleşme dosyasını hazırla
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts/retrace-mapping

          if [ -f app/build/outputs/mapping/release/mapping.txt ]; then
            cp app/build/outputs/mapping/release/mapping.txt "dist_artifacts/retrace-mapping/mapping-${APP_VERSION}.txt"
          else
            echo "mapping.txt bulunamadı. minifyEnabled true değilse veya release build tamamlanmadıysa bu normaldir." \
              > dist_artifacts/retrace-mapping/mapping-yok.txt
          fi

          find app/build/outputs/mapping/release -type f -print -exec cp {} dist_artifacts/retrace-mapping/ \; || true
          ls -la dist_artifacts/retrace-mapping | tee early_diagnostics/retrace_mapping_listesi.txt

      - name: Yerel hata ayıklama sembollerini hazırla
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts/native-debug-symbols/raw

          find . -type f -name "*.so" \
            ! -path "./.git/*" \
            ! -path "./dist_artifacts/*" \
            | sort | tee early_diagnostics/native_so_listesi.txt || true

          if [ -s early_diagnostics/native_so_listesi.txt ]; then
            while IFS= read -r sofile; do
              abi="unknown"
              case "$sofile" in
                *"/arm64-v8a/"*) abi="arm64-v8a" ;;
                *"/armeabi-v7a/"*) abi="armeabi-v7a" ;;
                *"/x86_64/"*) abi="x86_64" ;;
                *"/x86/"*) abi="x86" ;;
              esac

              mkdir -p "dist_artifacts/native-debug-symbols/raw/${abi}"
              cp "$sofile" "dist_artifacts/native-debug-symbols/raw/${abi}/$(basename "$sofile")"
            done < early_diagnostics/native_so_listesi.txt

            (
              cd dist_artifacts/native-debug-symbols/raw
              zip -r "../native-debug-symbols-${APP_VERSION}.zip" .
            )
          else
            echo "Native .so bulunamadı. Saf Java/XML projede bu normaldir." \
              > dist_artifacts/native-debug-symbols/native-symbols-yok.txt
          fi

          find dist_artifacts/native-debug-symbols -type f | sort | tee early_diagnostics/native_debug_symbols_listesi.txt

      - name: Build çıktıları listele
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "===== AAB ====="
            find dist_artifacts/aab -type f -print || true
            echo ""
            echo "===== RETRACE MAPPING ====="
            find dist_artifacts/retrace-mapping -type f -print || true
            echo ""
            echo "===== NATIVE DEBUG SYMBOLS ====="
            find dist_artifacts/native-debug-symbols -type f -print || true
            echo ""
            echo "===== EARLY DIAGNOSTICS ====="
            find early_diagnostics -type f -print || true
          } | tee early_diagnostics/build_ciktilari.txt

      - name: Hata özeti hazırla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          logs = {
              "Keystore hatası": oku("early_diagnostics/keystore_hatasi.txt"),
              "Keystore Base64 decode hatası": oku("early_diagnostics/keystore_base64_decode_hatasi.txt"),
              "Keystore doğrulama": oku("early_diagnostics/keystore_dogrulama.txt"),
              "Gradle build hatası": oku("early_diagnostics/gradle_build_hatasi.txt"),
              "AAB imza hatası": oku("early_diagnostics/aab_imza_hatasi.txt"),
              "Repo eksik dosya": oku("early_diagnostics/repo_eksik_dosya.txt"),
              "Build AAB log": oku("build_aab.log"),
              "Build clean log": oku("build_clean.log"),
          }

          output = ["## Android AAB build hata özeti", ""]

          sebep_yazildi = False

          for title, text in logs.items():
              if text.strip():
                  sebep_yazildi = True
                  output.append(f"### Muhtemel sebep: {title}")
                  output.append("```text")
                  output.append(text[:18000])
                  output.append("```")
                  output.append("")

          if not sebep_yazildi:
              output.append("### Muhtemel sebep bulunamadı")
              output.append("```text")
              output.append("Build erken aşamada durmuş olabilir. early_diagnostics klasörünü kontrol et.")
              output.append("```")

          Path("summary.md").write_text("\n".join(output), encoding="utf-8")
          PY

      - name: Hata özetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            early_diagnostics/**
            build_clean.log
            build_aab.log
            summary.md
            env_dump.txt
            sdk_list.txt
          if-no-files-found: warn

      - name: AAB yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: play-console-aab-${{ env.APP_VERSION }}
          path: dist_artifacts/aab/*.aab
          if-no-files-found: error

      - name: ReTrace eşleşme dosyasını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: retrace-mapping-${{ env.APP_VERSION }}
          path: dist_artifacts/retrace-mapping/**
          if-no-files-found: warn

      - name: Yerel hata ayıklama sembollerini yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: native-debug-symbols-${{ env.APP_VERSION }}
          path: dist_artifacts/native-debug-symbols/**
          if-no-files-found: warn
