name: Android Build (AAB) - API 35 + Full Diagnostics

on:
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}
      APP_VERSION_CODE: ${{ github.run_number }}

      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      ANDROIDAPI: "35"
      ANDROIDMINAPI: "24"

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4

      - name: Secret mask uygula
        shell: bash
        run: |
          set -euxo pipefail
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"

      - name: Erken repo logu
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p early_diagnostics

          {
            echo "PWD=$(pwd)"
            echo "GITHUB_REF=${GITHUB_REF}"
            echo "GITHUB_SHA=${GITHUB_SHA}"
            echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_VERSION_CODE=${APP_VERSION_CODE}"
            echo ""
            echo "---- repo kok ----"
            ls -la
            echo ""
            echo "---- workflows ----"
            find .github/workflows -maxdepth 2 -type f -print -exec sed -n '1,460p' {} \; || true
            echo ""
            echo "---- settings.gradle ----"
            test -f settings.gradle && sed -n '1,220p' settings.gradle || true
            echo ""
            echo "---- root build.gradle ----"
            test -f build.gradle && sed -n '1,260p' build.gradle || true
            echo ""
            echo "---- gradle.properties ----"
            test -f gradle.properties && sed -n '1,220p' gradle.properties || true
            echo ""
            echo "---- app/build.gradle ----"
            test -f app/build.gradle && sed -n '1,460p' app/build.gradle || true
            echo ""
            echo "---- AndroidManifest.xml ----"
            test -f app/src/main/AndroidManifest.xml && sed -n '1,320p' app/src/main/AndroidManifest.xml || true
            echo ""
            echo "---- java dosyalari ----"
            find app/src/main/java -type f | sort || true
            echo ""
            echo "---- res dosyalari ----"
            find app/src/main/res -type f | sort || true
          } | tee early_diagnostics/erken_repo_logu.txt

      - name: Cache temizle
        shell: bash
        run: |
          set -euxo pipefail
          echo "[LOG] Cache temizleme basladi." | tee early_diagnostics/cache_temizleme.txt
          rm -rf .gradle app/build build dist_artifacts play_console_upload secure
          rm -rf ~/.gradle/caches ~/.gradle/daemon ~/.gradle/native
          echo "[LOG] Cache temizleme tamamlandi." | tee -a early_diagnostics/cache_temizleme.txt

      - name: Android SDK ortamını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          SDKMANAGER_BIN="$(find "$ANDROID_SDK_ROOT" -type f -name sdkmanager | sort | head -n 1 || true)"

          if [ -z "$SDKMANAGER_BIN" ] || [ ! -x "$SDKMANAGER_BIN" ]; then
            echo "HATA: sdkmanager bulunamadı." | tee early_diagnostics/sdkmanager_hatasi.txt
            exit 1
          fi

          echo "SDKMANAGER_BIN=$SDKMANAGER_BIN" >> "$GITHUB_ENV"
          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          {
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            echo "SDKMANAGER_BIN=$SDKMANAGER_BIN"
            java -version
            javac -version
            "$SDKMANAGER_BIN" --version
          } 2>&1 | tee early_diagnostics/ortam_kontrolu.txt

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$SDKMANAGER_BIN" --licenses > /dev/null || true
          "$SDKMANAGER_BIN" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" 2>&1 | tee early_diagnostics/android_platform_kurulum.txt

      - name: Kurulu Android paketlerini doğrula
        shell: bash
        run: |
          set -euxo pipefail
          {
            "$SDKMANAGER_BIN" --list | sed -n '/Installed packages:/,/Available Packages:/p' || true
            test -f "$ANDROID_SDK_ROOT/platforms/android-35/android.jar"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign"
          } 2>&1 | tee early_diagnostics/android_paket_dogrulama.txt

      - name: Repo dosyalarını kontrol et
        shell: bash
        run: |
          set -euxo pipefail

          kontrol_et() {
            if [ ! -f "$1" ]; then
              echo "HATA: Gerekli dosya bulunamadı: $1" | tee -a early_diagnostics/repo_eksik_dosya.txt
              exit 1
            fi
          }

          {
            kontrol_et settings.gradle
            kontrol_et gradle.properties
            kontrol_et build.gradle
            kontrol_et app/build.gradle
            kontrol_et app/src/main/AndroidManifest.xml
            kontrol_et app/src/main/java/org/fy/kodeditoru/MainActivity.java
            kontrol_et app/src/main/java/org/fy/kodeditoru/SplashActivity.java
            kontrol_et app/src/main/res/layout/activity_main.xml
            kontrol_et app/src/main/res/values/themes.xml
            kontrol_et app/src/main/res/values/colors.xml
            kontrol_et app/src/main/res/values/dimens.xml
            kontrol_et app/src/main/res/drawable/splash_background.xml
            kontrol_et app/src/main/res/drawable/card_background.xml
            kontrol_et app/src/main/res/drawable/button_background.xml
            kontrol_et app/src/main/res/drawable/topbar_background.xml
            kontrol_et app/src/main/res/drawable/input_background.xml
            kontrol_et app/src/main/res/drawable/preview_background.xml
            kontrol_et app/src/main/res/drawable/status_badge_background.xml

            echo "Repo dosya kontrolü başarılı."
            find . -maxdepth 6 -type f | sort
          } 2>&1 | tee early_diagnostics/repo_dosya_kontrolu.txt

      - name: Release keystore oluştur
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p secure

          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "HATA: ANDROID_KEYSTORE_BASE64 secret boş." | tee early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "HATA: ANDROID_KEYSTORE_PASSWORD secret boş." | tee early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "HATA: ANDROID_KEY_ALIAS secret boş." | tee early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          if [ -z "${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}" ]; then
            echo "HATA: ANDROID_KEY_ALIAS_PASSWORD secret boş." | tee early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | tr -d '\n\r ' \
            | base64 --decode > secure/release.keystore

          if [ ! -s secure/release.keystore ]; then
            echo "HATA: release.keystore oluşturuldu ama dosya boş. ANDROID_KEYSTORE_BASE64 bozuk olabilir." | tee early_diagnostics/keystore_hatasi.txt
            exit 1
          fi

          chmod 600 secure/release.keystore

          echo "ANDROID_KEYSTORE_PATH=${GITHUB_WORKSPACE}/secure/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS_PASSWORD=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}" >> "$GITHUB_ENV"

          {
            echo "Keystore dosyası oluşturuldu."
            echo "Keystore path: ${GITHUB_WORKSPACE}/secure/release.keystore"
            echo "Keystore size:"
            ls -lh secure/release.keystore
          } | tee early_diagnostics/keystore_olusturma.txt

      - name: Keystore doğrula
        shell: bash
        run: |
          set -euxo pipefail

          if ! keytool -list \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" 2>&1 | tee early_diagnostics/keystore_dogrulama.txt; then

            {
              echo ""
              echo "HATA: Keystore doğrulanamadı."
              echo "Muhtemel sebepler:"
              echo "1. ANDROID_KEYSTORE_PASSWORD yanlış."
              echo "2. ANDROID_KEY_ALIAS yanlış."
              echo "3. ANDROID_KEYSTORE_BASE64 yanlış keystore dosyasından üretildi."
              echo "4. Secret içine base64 çıktısı eksik/bozuk yapıştırıldı."
              echo ""
              echo "Ubuntu tekrar üretim komutu:"
              echo "base64 -w 0 release.keystore"
              echo ""
              echo "Alias kontrol komutu:"
              echo "keytool -list -v -keystore release.keystore"
            } | tee -a early_diagnostics/keystore_hatasi.txt

            exit 1
          fi

      - name: Gradle komutunu hazırla
        shell: bash
        run: |
          set -euxo pipefail
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

      - name: Gradle bilgisi
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD --version 2>&1 | tee early_diagnostics/gradle_bilgisi.txt

      - name: Ortam dump al
        shell: bash
        run: |
          set -euxo pipefail
          env | sort > env_dump.txt
          "$SDKMANAGER_BIN" --list > sdk_list.txt || true

      - name: Gradle clean
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD clean --stacktrace --info 2>&1 | tee build_clean.log

      - name: Release AAB derle
        shell: bash
        run: |
          set -euxo pipefail

          if ! $GRADLE_CMD :app:bundleRelease --stacktrace --info 2>&1 | tee build_aab.log; then
            {
              echo ""
              echo "HATA: :app:bundleRelease başarısız oldu."
              echo "Muhtemel sebepler:"
              echo "1. Java dosyasında compile hatası."
              echo "2. XML resource hatası."
              echo "3. AndroidManifest.xml hatası."
              echo "4. app/build.gradle signingConfig veya dependency hatası."
              echo "5. drawable/color/dimen kaynak adı hatası."
              echo ""
              echo "Ayrıntı için build_aab.log dosyasını kontrol et."
            } | tee early_diagnostics/gradle_build_hatasi.txt
            exit 1
          fi

      - name: AAB dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts
          mkdir -p play_console_upload

          AAB_PATH="$(find app/build/outputs/bundle -type f -name '*.aab' | sort | head -n 1)"

          if [ -z "$AAB_PATH" ]; then
            echo "HATA: AAB dosyası bulunamadı. bundleRelease tamamlanmamış olabilir." | tee early_diagnostics/aab_bulunamadi.txt
            exit 1
          fi

          cp "$AAB_PATH" "dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"
          cp "$AAB_PATH" "play_console_upload/mini-kod-editoru-${APP_VERSION}.aab"

          ls -lh dist_artifacts | tee early_diagnostics/aab_cikti_listesi.txt
          ls -lh play_console_upload | tee early_diagnostics/play_console_yukleme_listesi.txt

      - name: AAB imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"
          test -f "$AAB_PATH"

          if ! jarsigner -verify -verbose -certs "$AAB_PATH" 2>&1 | tee early_diagnostics/aab_imza_dogrula.txt; then
            {
              echo ""
              echo "HATA: AAB imza doğrulaması başarısız."
              echo "Muhtemel sebepler:"
              echo "1. signingConfig release doğru bağlanmadı."
              echo "2. Keystore bilgileri yanlış."
              echo "3. AAB dosyası bozuk oluştu."
            } | tee early_diagnostics/aab_imza_hatasi.txt
            exit 1
          fi

      - name: AAB manifest ve kaynak dosyalarını çıkar
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p play_console_upload/aab_inspect

          AAB_PATH="dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"

          unzip -l "$AAB_PATH" | tee play_console_upload/aab_file_list.txt
          unzip -q "$AAB_PATH" -d play_console_upload/aab_inspect

          find play_console_upload/aab_inspect -maxdepth 5 -type f | sort | tee play_console_upload/aab_extracted_files.txt

      - name: Play Console belge paketi hazırla
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p play_console_upload/reports

          cp early_diagnostics/aab_imza_dogrula.txt play_console_upload/reports/aab_imza_dogrula.txt
          cp early_diagnostics/aab_cikti_listesi.txt play_console_upload/reports/aab_cikti_listesi.txt
          cp early_diagnostics/repo_dosya_kontrolu.txt play_console_upload/reports/repo_dosya_kontrolu.txt
          cp early_diagnostics/gradle_bilgisi.txt play_console_upload/reports/gradle_bilgisi.txt
          cp early_diagnostics/keystore_dogrulama.txt play_console_upload/reports/keystore_dogrulama.txt
          cp build_aab.log play_console_upload/reports/build_aab.log
          cp env_dump.txt play_console_upload/reports/env_dump.txt
          cp sdk_list.txt play_console_upload/reports/sdk_list.txt

          {
            echo "# Play Console Yükleme Paketi"
            echo ""
            echo "Uygulama: Mini Kod Editörü"
            echo "Package: org.fy.kodeditoru"
            echo "Version Name: ${APP_VERSION}"
            echo "Version Code: ${APP_VERSION_CODE}"
            echo "Min SDK: ${ANDROIDMINAPI}"
            echo "Target SDK: ${ANDROIDAPI}"
            echo ""
            echo "## Yüklenecek ana dosya"
            echo "mini-kod-editoru-${APP_VERSION}.aab"
            echo ""
            echo "## Ek belgeler"
            echo "- reports/aab_imza_dogrula.txt"
            echo "- reports/aab_cikti_listesi.txt"
            echo "- reports/repo_dosya_kontrolu.txt"
            echo "- reports/gradle_bilgisi.txt"
            echo "- reports/keystore_dogrulama.txt"
            echo "- reports/build_aab.log"
            echo "- aab_file_list.txt"
            echo "- aab_extracted_files.txt"
          } > play_console_upload/README_PLAY_CONSOLE.txt

          (
            cd play_console_upload
            zip -r "../dist_artifacts/play-console-belgeleri-${APP_VERSION}.zip" .
          )

      - name: Build çıktıları listele
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "===== AAB ====="
            find app/build/outputs/bundle -type f -name "*.aab" -print || true
            echo ""
            echo "===== DIST ====="
            find dist_artifacts -type f -print || true
            echo ""
            echo "===== PLAY CONSOLE UPLOAD ====="
            find play_console_upload -type f -print || true
            echo ""
            echo "===== EARLY DIAGNOSTICS ====="
            find early_diagnostics -type f -print || true
            echo ""
            echo "===== BUILD FILES SAMPLE ====="
            find app/build -maxdepth 5 -type f | sort | head -300 || true
          } | tee early_diagnostics/build_ciktilari.txt

      - name: Gradle Android özetini çıkar
        if: ${{ always() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = "\n".join([
              oku("build_clean.log"),
              oku("build_aab.log"),
              oku("early_diagnostics/keystore_hatasi.txt"),
              oku("early_diagnostics/gradle_build_hatasi.txt"),
              oku("early_diagnostics/aab_imza_hatasi.txt"),
              oku("early_diagnostics/repo_eksik_dosya.txt"),
          ]).splitlines()

          patterns = [
              r"gradle",
              r"android",
              r"aab",
              r"bundle",
              r"manifest",
              r"resources",
              r"aapt",
              r"dex",
              r"javac",
              r"compile",
              r"error",
              r"hata",
              r"failed",
              r"exception",
              r"warning",
              r"sign",
              r"jarsigner",
              r"keystore",
              r"secret",
              r"alias",
          ]

          selected = []
          seen = set()

          for line in log_text:
              low = line.lower()
              if any(re.search(pattern, low) for pattern in patterns):
                  clean = line.strip()
                  if clean and clean not in seen:
                      seen.add(clean)
                      selected.append(clean)

          sections = []
          sections.append("## Gradle / Android AAB build log özeti\n\n```text\n" + "\n".join(selected[:1000]) + "\n```")
          sections.append("## Erken teşhis dosyaları\n\n```text\n" + "\n".join(str(p) for p in sorted(Path("early_diagnostics").glob("*.txt"))) + "\n```")

          for early_file in sorted(Path("early_diagnostics").glob("*.txt")):
              text = oku(early_file)
              sections.append(f"## {early_file}\n\n```text\n{text[:18000]}\n```")

          for file_name, title in [
              ("play_console_upload/README_PLAY_CONSOLE.txt", "Play Console paket açıklaması"),
              ("play_console_upload/aab_file_list.txt", "AAB dosya listesi"),
              ("play_console_upload/aab_extracted_files.txt", "AAB çıkarılmış dosya listesi"),
          ]:
              text = oku(file_name)
              if text:
                  sections.append(f"## {title}\n\n```text\n{text[:18000]}\n```")

          Path("gradle_android_summary.md").write_text("\n\n".join(sections), encoding="utf-8")
          PY

      - name: Gradle Android özetini GitHub Summary'ye yaz
        if: ${{ always() }}
        shell: bash
        run: |
          cat gradle_android_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Hata özeti hazırla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          logs = {
              "Keystore hatası": oku("early_diagnostics/keystore_hatasi.txt"),
              "Keystore doğrulama": oku("early_diagnostics/keystore_dogrulama.txt"),
              "Gradle build hatası": oku("early_diagnostics/gradle_build_hatasi.txt"),
              "AAB imza hatası": oku("early_diagnostics/aab_imza_hatasi.txt"),
              "Repo eksik dosya": oku("early_diagnostics/repo_eksik_dosya.txt"),
              "Build AAB log": oku("build_aab.log"),
              "Build clean log": oku("build_clean.log"),
          }

          output = ["## Android AAB build hata özeti", ""]

          sebep_yazildi = False

          for title, text in logs.items():
              if text.strip():
                  sebep_yazildi = True
                  output.append(f"### Muhtemel sebep: {title}")
                  output.append("```text")
                  output.append(text[:18000])
                  output.append("```")
                  output.append("")

          if not sebep_yazildi:
              output.append("### Muhtemel sebep bulunamadı")
              output.append("```text")
              output.append("Build erken aşamada durmuş olabilir. early_diagnostics klasörünü kontrol et.")
              output.append("```")

          output.extend(["", "## Kontrol edilecek dosyalar"])

          output.append("```text")
          output.append("MiniKodEditoru/app/build.gradle")
          output.append("MiniKodEditoru/.github/workflows/android.yml")
          output.append("GitHub Secrets:")
          output.append("- ANDROID_KEYSTORE_BASE64")
          output.append("- ANDROID_KEYSTORE_PASSWORD")
          output.append("- ANDROID_KEY_ALIAS")
          output.append("- ANDROID_KEY_ALIAS_PASSWORD")
          output.append("```")

          output.extend(["", "## Erken teşhis dosyaları"])

          for early_file in sorted(Path("early_diagnostics").glob("*.txt")):
              text = oku(early_file)
              output.extend(["", f"### {early_file}", "```text", text[:18000], "```"])

          env_dump = oku("env_dump.txt")
          if env_dump:
              selected = []
              for line in env_dump.splitlines():
                  if any(key in line for key in [
                      "ANDROID", "JAVA_HOME", "GITHUB_WORKSPACE",
                      "RUNNER_OS", "BUILD_NUMBER", "APP_VERSION",
                      "APP_VERSION_CODE", "GRADLE", "SDKMANAGER"
                  ]):
                      selected.append(line)

              output.extend(["", "## Ortam özeti", "```text", "\n".join(selected[:360]), "```"])

          Path("summary.md").write_text("\n".join(output), encoding="utf-8")
          PY

      - name: Hata özetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build log ve teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            early_diagnostics/**
            build_clean.log
            build_aab.log
            summary.md
            gradle_android_summary.md
            env_dump.txt
            sdk_list.txt
            play_console_upload/**
            dist_artifacts/play-console-belgeleri-${{ env.APP_VERSION }}.zip
          if-no-files-found: warn

      - name: Play Console AAB yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: play-console-aab-${{ env.APP_VERSION }}
          path: play_console_upload/*.aab
          if-no-files-found: error

      - name: Play Console belgeleri yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: play-console-belgeleri-${{ env.APP_VERSION }}
          path: dist_artifacts/play-console-belgeleri-${{ env.APP_VERSION }}.zip
          if-no-files-found: error
