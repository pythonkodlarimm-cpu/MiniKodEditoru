name: Android Build (AAB) - API 35 + Full Diagnostics

on:
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}
      APP_VERSION_CODE: ${{ github.run_number }}

      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      ANDROIDAPI: "35"
      ANDROIDMINAPI: "24"

      BUNDLETOOL_VERSION: "1.18.2"

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4

      - name: Erken repo logu
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p early_diagnostics
          {
            echo "PWD=$(pwd)"
            echo "GITHUB_REF=${GITHUB_REF}"
            echo "GITHUB_SHA=${GITHUB_SHA}"
            echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_VERSION_CODE=${APP_VERSION_CODE}"
            echo ""
            echo "---- repo kok ----"
            ls -la
            echo ""
            echo "---- workflows ----"
            find .github/workflows -maxdepth 2 -type f -print -exec sed -n '1,360p' {} \; || true
            echo ""
            echo "---- settings.gradle ----"
            test -f settings.gradle && sed -n '1,220p' settings.gradle || true
            echo ""
            echo "---- root build.gradle ----"
            test -f build.gradle && sed -n '1,260p' build.gradle || true
            echo ""
            echo "---- app/build.gradle ----"
            test -f app/build.gradle && sed -n '1,320p' app/build.gradle || true
            echo ""
            echo "---- AndroidManifest.xml ----"
            test -f app/src/main/AndroidManifest.xml && sed -n '1,260p' app/src/main/AndroidManifest.xml || true
            echo ""
            echo "---- java dosyalari ----"
            find app/src/main/java -type f | sort || true
            echo ""
            echo "---- res dosyalari ----"
            find app/src/main/res -type f | sort || true
          } | tee early_diagnostics/erken_repo_logu.txt

      - name: Cache temizle
        shell: bash
        run: |
          set -euxo pipefail
          echo "[LOG] Cache temizleme basladi." | tee early_diagnostics/cache_temizleme.txt
          rm -rf .gradle app/build build dist_artifacts adid_check
          rm -rf ~/.gradle/caches ~/.gradle/daemon ~/.gradle/native
          echo "[LOG] Cache temizleme tamamlandi." | tee -a early_diagnostics/cache_temizleme.txt

      - name: Android SDK ortamını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          SDKMANAGER_BIN="$(find "$ANDROID_SDK_ROOT" -type f -name sdkmanager | sort | head -n 1 || true)"

          if [ -z "$SDKMANAGER_BIN" ] || [ ! -x "$SDKMANAGER_BIN" ]; then
            echo "HATA: sdkmanager bulunamadı."
            exit 1
          fi

          echo "SDKMANAGER_BIN=$SDKMANAGER_BIN" >> "$GITHUB_ENV"
          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          {
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            echo "SDKMANAGER_BIN=$SDKMANAGER_BIN"
            java -version
            javac -version
            "$SDKMANAGER_BIN" --version
          } 2>&1 | tee early_diagnostics/ortam_kontrolu.txt

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$SDKMANAGER_BIN" --licenses > /dev/null || true
          "$SDKMANAGER_BIN" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" 2>&1 | tee early_diagnostics/android_platform_kurulum.txt

      - name: Kurulu Android paketlerini doğrula
        shell: bash
        run: |
          set -euxo pipefail
          {
            "$SDKMANAGER_BIN" --list | sed -n '/Installed packages:/,/Available Packages:/p' || true
            test -f "$ANDROID_SDK_ROOT/platforms/android-35/android.jar"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign"
          } 2>&1 | tee early_diagnostics/android_paket_dogrulama.txt

      - name: Repo dosyalarını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          {
            test -f settings.gradle
            test -f gradle.properties
            test -f app/build.gradle
            test -f app/src/main/AndroidManifest.xml
            test -f app/src/main/java/org/fy/kodeditoru/MainActivity.java
            test -f app/src/main/java/org/fy/kodeditoru/SplashActivity.java
            test -f app/src/main/res/layout/activity_main.xml
            test -f app/src/main/res/values/themes.xml
            test -f app/src/main/res/values/colors.xml
            test -f app/src/main/res/values/dimens.xml
            test -f app/src/main/res/drawable/splash_background.xml
            test -f app/src/main/res/drawable/card_background.xml
            test -f app/src/main/res/drawable/button_background.xml
            test -f app/src/main/res/drawable/topbar_background.xml
            test -f app/src/main/res/drawable/input_background.xml
            test -f app/src/main/res/drawable/preview_background.xml
            test -f app/src/main/res/drawable/status_badge_background.xml

            find . -maxdepth 5 -type f | sort
          } 2>&1 | tee early_diagnostics/repo_dosya_kontrolu.txt

      - name: Gradle komutunu hazırla
        shell: bash
        run: |
          set -euxo pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

      - name: Gradle bilgisi
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD --version 2>&1 | tee early_diagnostics/gradle_bilgisi.txt

      - name: Ortam dump al
        shell: bash
        run: |
          set -euxo pipefail
          env | sort > env_dump.txt
          "$SDKMANAGER_BIN" --list > sdk_list.txt || true

      - name: Gradle clean
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD clean --stacktrace --info 2>&1 | tee build_clean.log

      - name: Debug APK derle
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD :app:assembleDebug --stacktrace --info 2>&1 | tee build_debug_apk.log

      - name: Release AAB derle
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD :app:bundleRelease --stacktrace --info 2>&1 | tee build_aab.log

      - name: AAB dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts
          AAB_PATH="$(find app/build/outputs/bundle -type f -name '*.aab' | sort | head -n 1)"
          test -n "$AAB_PATH"
          cp "$AAB_PATH" "dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"
          ls -lh dist_artifacts | tee early_diagnostics/aab_cikti_listesi.txt

      - name: Debug APK dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="$(find app/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1 || true)"
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "dist_artifacts/mini-kod-editoru-debug-${APP_VERSION}.apk"
          fi
          ls -lh dist_artifacts | tee early_diagnostics/apk_cikti_listesi.txt

      - name: bundletool indir
        shell: bash
        run: |
          set -euxo pipefail
          BUNDLETOOL_URL="https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar"
          curl -fL "$BUNDLETOOL_URL" -o bundletool.jar
          test -s bundletool.jar
          java -jar bundletool.jar version 2>&1 | tee bundletool_version.txt

      - name: Geçici test keystore oluştur
        shell: bash
        run: |
          set -euxo pipefail
          keytool -genkeypair \
            -keystore temp-debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          test -s temp-debug.keystore

      - name: AAB içinden universal APK üret
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p adid_check
          java -jar bundletool.jar build-apks \
            --bundle="dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab" \
            --output="adid_check/app.apks" \
            --mode=universal \
            --ks="temp-debug.keystore" \
            --ks-pass=pass:android \
            --ks-key-alias="androiddebugkey" \
            --key-pass=pass:android \
            --overwrite

          test -f adid_check/app.apks
          unzip -q adid_check/app.apks -d adid_check/apks
          test -f adid_check/apks/universal.apk

      - name: Universal APK manifest ve dosya kontrolü
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH="adid_check/apks/universal.apk"

          "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt" dump badging "$APK_PATH" | tee adid_check/aapt_badging.txt || true
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt" dump permissions "$APK_PATH" | tee adid_check/aapt_permissions.txt || true
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt" dump xmltree "$APK_PATH" AndroidManifest.xml | tee adid_check/manifest_tree.txt || true
          unzip -l "$APK_PATH" | tee adid_check/apk_file_list.txt

          if ! grep -q "classes.dex" adid_check/apk_file_list.txt; then
            echo "HATA: classes.dex universal APK içinde bulunamadı." | tee adid_check/adid_result.txt
            exit 1
          fi

          if ! grep -q "org.fy.kodeditoru" adid_check/aapt_badging.txt; then
            echo "HATA: Paket adı beklenen şekilde değil." | tee adid_check/adid_result.txt
            exit 1
          fi

          echo "Universal APK kontrolü başarılı." | tee adid_check/adid_result.txt

      - name: AAB imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"
          test -f "$AAB_PATH"
          jarsigner -verify -verbose -certs "$AAB_PATH" 2>&1 | tee early_diagnostics/aab_imza_dogrula.txt || true

      - name: Build çıktıları listele
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "===== APK ====="
            find app/build/outputs/apk -type f -name "*.apk" -print || true
            echo ""
            echo "===== AAB ====="
            find app/build/outputs/bundle -type f -name "*.aab" -print || true
            echo ""
            echo "===== DIST ====="
            find dist_artifacts -type f -print || true
            echo ""
            echo "===== BUILD FILES SAMPLE ====="
            find app/build -maxdepth 5 -type f | sort | head -300 || true
          } | tee early_diagnostics/build_ciktilari.txt

      - name: Gradle Android özetini çıkar
        if: ${{ always() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = "\n".join([
              oku("build_clean.log"),
              oku("build_debug_apk.log"),
              oku("build_aab.log"),
          ]).splitlines()

          patterns = [
              r"gradle",
              r"android",
              r"aab",
              r"apk",
              r"bundle",
              r"manifest",
              r"resources",
              r"aapt",
              r"dex",
              r"javac",
              r"compile",
              r"error",
              r"failed",
              r"exception",
              r"warning",
              r"sign",
              r"jarsigner",
              r"bundletool",
          ]

          selected = []
          seen = set()

          for line in log_text:
              low = line.lower()
              if any(re.search(pattern, low) for pattern in patterns):
                  clean = line.strip()
                  if clean and clean not in seen:
                      seen.add(clean)
                      selected.append(clean)

          sections = []
          sections.append("## Gradle / Android build log özeti\n\n```text\n" + "\n".join(selected[:800]) + "\n```")
          sections.append("## Erken teşhis dosyaları\n\n```text\n" + "\n".join(str(p) for p in sorted(Path("early_diagnostics").glob("*.txt"))) + "\n```")

          for early_file in sorted(Path("early_diagnostics").glob("*.txt")):
              text = oku(early_file)
              sections.append(f"## {early_file}\n\n```text\n{text[:16000]}\n```")

          for file_name, title in [
              ("bundletool_version.txt", "Bundletool sürümü"),
              ("adid_check/adid_result.txt", "Universal APK kontrol sonucu"),
              ("adid_check/aapt_badging.txt", "aapt badging"),
              ("adid_check/aapt_permissions.txt", "aapt permissions"),
              ("adid_check/manifest_tree.txt", "manifest xmltree"),
              ("adid_check/apk_file_list.txt", "APK dosya listesi"),
          ]:
              text = oku(file_name)
              if text:
                  sections.append(f"## {title}\n\n```text\n{text[:16000]}\n```")

          Path("gradle_android_summary.md").write_text("\n\n".join(sections), encoding="utf-8")
          PY

      - name: Gradle Android özetini GitHub Summary'ye yaz
        if: ${{ always() }}
        shell: bash
        run: |
          cat gradle_android_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Hata özeti hazırla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = "\n".join([
              oku("build_clean.log"),
              oku("build_debug_apk.log"),
              oku("build_aab.log"),
          ])

          ansi_re = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")
          clean = ansi_re.sub("", log_text)
          lines = clean.splitlines()

          keywords = (
              "error", "failed", "exception", "traceback", "build failed",
              "gradle", "aapt", "manifest", "resource", "compile",
              "javac", "dex", "bundle", "aab", "apk", "sign",
              "jarsigner", "bundletool", "no such file", "does not exist"
          )

          chunks = []

          for index, line in enumerate(lines):
              low = line.lower()
              if any(keyword in low for keyword in keywords):
                  start = max(0, index - 8)
                  end = min(len(lines), index + 24)
                  chunk = "\n".join(lines[start:end]).strip()
                  if chunk and chunk not in chunks:
                      chunks.append(chunk)

          output = ["## Android build hata özeti", ""]

          if chunks:
              for idx, chunk in enumerate(chunks[:30], 1):
                  output.append(f"### Kritik parça {idx}")
                  output.append("```text")
                  output.append(chunk)
                  output.append("```")
                  output.append("")
          else:
              output.append("### Son 300 satır")
              output.append("```text")
              output.append("\n".join(lines[-300:]))
              output.append("```")

          output.extend(["", "## Erken teşhis dosyaları"])

          for early_file in sorted(Path("early_diagnostics").glob("*.txt")):
              text = oku(early_file)
              output.extend(["", f"### {early_file}", "```text", text[:16000], "```"])

          for extra in [
              "bundletool_version.txt",
              "adid_check/adid_result.txt",
              "adid_check/aapt_badging.txt",
              "adid_check/aapt_permissions.txt",
              "adid_check/manifest_tree.txt",
              "adid_check/apk_file_list.txt",
          ]:
              text = oku(extra)
              if text:
                  output.extend(["", f"## {extra}", "```text", text[:16000], "```"])

          env_dump = oku("env_dump.txt")
          if env_dump:
              selected = []
              for line in env_dump.splitlines():
                  if any(key in line for key in [
                      "ANDROID", "JAVA_HOME", "GITHUB_WORKSPACE",
                      "RUNNER_OS", "BUILD_NUMBER", "APP_VERSION",
                      "APP_VERSION_CODE", "GRADLE", "SDKMANAGER"
                  ]):
                      selected.append(line)

              output.extend(["", "## Ortam özeti", "```text", "\n".join(selected[:360]), "```"])

          Path("summary.md").write_text("\n".join(output), encoding="utf-8")
          PY

      - name: Hata özetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build log ve teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            early_diagnostics/**
            build_clean.log
            build_debug_apk.log
            build_aab.log
            summary.md
            gradle_android_summary.md
            env_dump.txt
            sdk_list.txt
            bundletool.jar
            bundletool_version.txt
            adid_check/**
            dist_artifacts/**
          if-no-files-found: warn

      - name: AAB yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: mini-kod-editoru-aab-${{ env.APP_VERSION }}
          path: dist_artifacts/*.aab
          if-no-files-found: error

      - name: Debug APK yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: mini-kod-editoru-debug-apk-${{ env.APP_VERSION }}
          path: dist_artifacts/*debug*.apk
          if-no-files-found: warn
