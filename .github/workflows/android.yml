name: Android Build (AAB) - API 35 + Full Diagnostics

on:
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILD_NUMBER: ${{ github.run_number }}
      APP_VERSION: 0.1.${{ github.run_number }}
      APP_VERSION_CODE: ${{ github.run_number }}

      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      ANDROIDAPI: "35"
      ANDROIDMINAPI: "24"

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4

      - name: Secret mask uygula
        shell: bash
        run: |
          set -euxo pipefail
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS }}"
          echo "::add-mask::${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"

      - name: Erken repo logu
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p early_diagnostics
          {
            echo "PWD=$(pwd)"
            echo "GITHUB_REF=${GITHUB_REF}"
            echo "GITHUB_SHA=${GITHUB_SHA}"
            echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_VERSION_CODE=${APP_VERSION_CODE}"
            echo ""
            echo "---- repo kok ----"
            ls -la
            echo ""
            echo "---- workflows ----"
            find .github/workflows -maxdepth 2 -type f -print -exec sed -n '1,420p' {} \; || true
            echo ""
            echo "---- settings.gradle ----"
            test -f settings.gradle && sed -n '1,220p' settings.gradle || true
            echo ""
            echo "---- root build.gradle ----"
            test -f build.gradle && sed -n '1,260p' build.gradle || true
            echo ""
            echo "---- gradle.properties ----"
            test -f gradle.properties && sed -n '1,220p' gradle.properties || true
            echo ""
            echo "---- app/build.gradle ----"
            test -f app/build.gradle && sed -n '1,420p' app/build.gradle || true
            echo ""
            echo "---- AndroidManifest.xml ----"
            test -f app/src/main/AndroidManifest.xml && sed -n '1,300p' app/src/main/AndroidManifest.xml || true
            echo ""
            echo "---- java dosyalari ----"
            find app/src/main/java -type f | sort || true
            echo ""
            echo "---- res dosyalari ----"
            find app/src/main/res -type f | sort || true
          } | tee early_diagnostics/erken_repo_logu.txt

      - name: Cache temizle
        shell: bash
        run: |
          set -euxo pipefail
          echo "[LOG] Cache temizleme basladi." | tee early_diagnostics/cache_temizleme.txt
          rm -rf .gradle app/build build dist_artifacts play_console_upload
          rm -rf ~/.gradle/caches ~/.gradle/daemon ~/.gradle/native
          echo "[LOG] Cache temizleme tamamlandi." | tee -a early_diagnostics/cache_temizleme.txt

      - name: Android SDK ortamını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          SDKMANAGER_BIN="$(find "$ANDROID_SDK_ROOT" -type f -name sdkmanager | sort | head -n 1 || true)"

          if [ -z "$SDKMANAGER_BIN" ] || [ ! -x "$SDKMANAGER_BIN" ]; then
            echo "HATA: sdkmanager bulunamadı."
            exit 1
          fi

          echo "SDKMANAGER_BIN=$SDKMANAGER_BIN" >> "$GITHUB_ENV"
          echo "$(dirname "$SDKMANAGER_BIN")" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          {
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            echo "SDKMANAGER_BIN=$SDKMANAGER_BIN"
            java -version
            javac -version
            "$SDKMANAGER_BIN" --version
          } 2>&1 | tee early_diagnostics/ortam_kontrolu.txt

      - name: Android platformlarını kur
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$SDKMANAGER_BIN" --licenses > /dev/null || true
          "$SDKMANAGER_BIN" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" 2>&1 | tee early_diagnostics/android_platform_kurulum.txt

      - name: Kurulu Android paketlerini doğrula
        shell: bash
        run: |
          set -euxo pipefail
          {
            "$SDKMANAGER_BIN" --list | sed -n '/Installed packages:/,/Available Packages:/p' || true
            test -f "$ANDROID_SDK_ROOT/platforms/android-35/android.jar"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign"
          } 2>&1 | tee early_diagnostics/android_paket_dogrulama.txt

      - name: Repo dosyalarını kontrol et
        shell: bash
        run: |
          set -euxo pipefail
          {
            test -f settings.gradle
            test -f gradle.properties
            test -f build.gradle
            test -f app/build.gradle
            test -f app/src/main/AndroidManifest.xml
            test -f app/src/main/java/org/fy/kodeditoru/MainActivity.java
            test -f app/src/main/java/org/fy/kodeditoru/SplashActivity.java
            test -f app/src/main/res/layout/activity_main.xml
            test -f app/src/main/res/values/themes.xml
            test -f app/src/main/res/values/colors.xml
            test -f app/src/main/res/values/dimens.xml
            test -f app/src/main/res/drawable/splash_background.xml
            test -f app/src/main/res/drawable/card_background.xml
            test -f app/src/main/res/drawable/button_background.xml
            test -f app/src/main/res/drawable/topbar_background.xml
            test -f app/src/main/res/drawable/input_background.xml
            test -f app/src/main/res/drawable/preview_background.xml
            test -f app/src/main/res/drawable/status_badge_background.xml

            find . -maxdepth 6 -type f | sort
          } 2>&1 | tee early_diagnostics/repo_dosya_kontrolu.txt

      - name: Release keystore oluştur
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p secure
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > secure/release.keystore
          test -s secure/release.keystore
          chmod 600 secure/release.keystore
          echo "ANDROID_KEYSTORE_PATH=${GITHUB_WORKSPACE}/secure/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS_PASSWORD=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Keystore doğrula
        shell: bash
        run: |
          set -euxo pipefail
          keytool -list \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" 2>&1 | tee early_diagnostics/keystore_dogrulama.txt

      - name: Gradle komutunu hazırla
        shell: bash
        run: |
          set -euxo pipefail
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

      - name: Gradle bilgisi
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD --version 2>&1 | tee early_diagnostics/gradle_bilgisi.txt

      - name: Ortam dump al
        shell: bash
        run: |
          set -euxo pipefail
          env | sort > env_dump.txt
          "$SDKMANAGER_BIN" --list > sdk_list.txt || true

      - name: Gradle clean
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD clean --stacktrace --info 2>&1 | tee build_clean.log

      - name: Release AAB derle
        shell: bash
        run: |
          set -euxo pipefail
          $GRADLE_CMD :app:bundleRelease --stacktrace --info 2>&1 | tee build_aab.log

      - name: AAB dosyasını ayır
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist_artifacts
          mkdir -p play_console_upload

          AAB_PATH="$(find app/build/outputs/bundle -type f -name '*.aab' | sort | head -n 1)"
          test -n "$AAB_PATH"

          cp "$AAB_PATH" "dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"
          cp "$AAB_PATH" "play_console_upload/mini-kod-editoru-${APP_VERSION}.aab"

          ls -lh dist_artifacts | tee early_diagnostics/aab_cikti_listesi.txt
          ls -lh play_console_upload | tee early_diagnostics/play_console_yukleme_listesi.txt

      - name: AAB imzasını doğrula
        shell: bash
        run: |
          set -euxo pipefail
          AAB_PATH="dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"
          test -f "$AAB_PATH"
          jarsigner -verify -verbose -certs "$AAB_PATH" 2>&1 | tee early_diagnostics/aab_imza_dogrula.txt

      - name: AAB manifest ve kaynak dosyalarını çıkar
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p play_console_upload/aab_inspect

          AAB_PATH="dist_artifacts/mini-kod-editoru-${APP_VERSION}.aab"

          unzip -l "$AAB_PATH" | tee play_console_upload/aab_file_list.txt

          unzip -q "$AAB_PATH" -d play_console_upload/aab_inspect

          find play_console_upload/aab_inspect -maxdepth 5 -type f | sort | tee play_console_upload/aab_extracted_files.txt

      - name: Play Console belge paketi hazırla
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p play_console_upload/reports

          cp early_diagnostics/aab_imza_dogrula.txt play_console_upload/reports/aab_imza_dogrula.txt
          cp early_diagnostics/aab_cikti_listesi.txt play_console_upload/reports/aab_cikti_listesi.txt
          cp early_diagnostics/repo_dosya_kontrolu.txt play_console_upload/reports/repo_dosya_kontrolu.txt
          cp early_diagnostics/gradle_bilgisi.txt play_console_upload/reports/gradle_bilgisi.txt
          cp build_aab.log play_console_upload/reports/build_aab.log
          cp env_dump.txt play_console_upload/reports/env_dump.txt
          cp sdk_list.txt play_console_upload/reports/sdk_list.txt

          {
            echo "# Play Console Yükleme Paketi"
            echo ""
            echo "Uygulama: Mini Kod Editörü"
            echo "Package: org.fy.kodeditoru"
            echo "Version Name: ${APP_VERSION}"
            echo "Version Code: ${APP_VERSION_CODE}"
            echo "Min SDK: ${ANDROIDMINAPI}"
            echo "Target SDK: ${ANDROIDAPI}"
            echo ""
            echo "## Yüklenecek ana dosya"
            echo "mini-kod-editoru-${APP_VERSION}.aab"
            echo ""
            echo "## Ek belgeler"
            echo "- reports/aab_imza_dogrula.txt"
            echo "- reports/aab_cikti_listesi.txt"
            echo "- reports/repo_dosya_kontrolu.txt"
            echo "- reports/gradle_bilgisi.txt"
            echo "- reports/build_aab.log"
            echo "- aab_file_list.txt"
            echo "- aab_extracted_files.txt"
          } > play_console_upload/README_PLAY_CONSOLE.txt

          (
            cd play_console_upload
            zip -r "../dist_artifacts/play-console-belgeleri-${APP_VERSION}.zip" .
          )

      - name: Build çıktıları listele
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "===== AAB ====="
            find app/build/outputs/bundle -type f -name "*.aab" -print || true
            echo ""
            echo "===== DIST ====="
            find dist_artifacts -type f -print || true
            echo ""
            echo "===== PLAY CONSOLE UPLOAD ====="
            find play_console_upload -type f -print || true
            echo ""
            echo "===== BUILD FILES SAMPLE ====="
            find app/build -maxdepth 5 -type f | sort | head -300 || true
          } | tee early_diagnostics/build_ciktilari.txt

      - name: Gradle Android özetini çıkar
        if: ${{ always() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = "\n".join([
              oku("build_clean.log"),
              oku("build_aab.log"),
          ]).splitlines()

          patterns = [
              r"gradle",
              r"android",
              r"aab",
              r"bundle",
              r"manifest",
              r"resources",
              r"aapt",
              r"dex",
              r"javac",
              r"compile",
              r"error",
              r"failed",
              r"exception",
              r"warning",
              r"sign",
              r"jarsigner",
          ]

          selected = []
          seen = set()

          for line in log_text:
              low = line.lower()
              if any(re.search(pattern, low) for pattern in patterns):
                  clean = line.strip()
                  if clean and clean not in seen:
                      seen.add(clean)
                      selected.append(clean)

          sections = []
          sections.append("## Gradle / Android AAB build log özeti\n\n```text\n" + "\n".join(selected[:800]) + "\n```")
          sections.append("## Erken teşhis dosyaları\n\n```text\n" + "\n".join(str(p) for p in sorted(Path("early_diagnostics").glob("*.txt"))) + "\n```")

          for early_file in sorted(Path("early_diagnostics").glob("*.txt")):
              text = oku(early_file)
              sections.append(f"## {early_file}\n\n```text\n{text[:16000]}\n```")

          for file_name, title in [
              ("play_console_upload/README_PLAY_CONSOLE.txt", "Play Console paket açıklaması"),
              ("play_console_upload/aab_file_list.txt", "AAB dosya listesi"),
              ("play_console_upload/aab_extracted_files.txt", "AAB çıkarılmış dosya listesi"),
          ]:
              text = oku(file_name)
              if text:
                  sections.append(f"## {title}\n\n```text\n{text[:16000]}\n```")

          Path("gradle_android_summary.md").write_text("\n\n".join(sections), encoding="utf-8")
          PY

      - name: Gradle Android özetini GitHub Summary'ye yaz
        if: ${{ always() }}
        shell: bash
        run: |
          cat gradle_android_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Hata özeti hazırla
        if: ${{ failure() }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def oku(dosya):
              p = Path(dosya)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="ignore")

          log_text = "\n".join([
              oku("build_clean.log"),
              oku("build_aab.log"),
          ])

          ansi_re = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")
          clean = ansi_re.sub("", log_text)
          lines = clean.splitlines()

          keywords = (
              "error", "failed", "exception", "traceback", "build failed",
              "gradle", "aapt", "manifest", "resource", "compile",
              "javac", "dex", "bundle", "aab", "sign",
              "jarsigner", "no such file", "does not exist", "keystore"
          )

          chunks = []

          for index, line in enumerate(lines):
              low = line.lower()
              if any(keyword in low for keyword in keywords):
                  start = max(0, index - 8)
                  end = min(len(lines), index + 24)
                  chunk = "\n".join(lines[start:end]).strip()
                  if chunk and chunk not in chunks:
                      chunks.append(chunk)

          output = ["## Android AAB build hata özeti", ""]

          if chunks:
              for idx, chunk in enumerate(chunks[:30], 1):
                  output.append(f"### Kritik parça {idx}")
                  output.append("```text")
                  output.append(chunk)
                  output.append("```")
                  output.append("")
          else:
              output.append("### Son 300 satır")
              output.append("```text")
              output.append("\n".join(lines[-300:]))
              output.append("```")

          output.extend(["", "## Erken teşhis dosyaları"])

          for early_file in sorted(Path("early_diagnostics").glob("*.txt")):
              text = oku(early_file)
              output.extend(["", f"### {early_file}", "```text", text[:16000], "```"])

          env_dump = oku("env_dump.txt")
          if env_dump:
              selected = []
              for line in env_dump.splitlines():
                  if any(key in line for key in [
                      "ANDROID", "JAVA_HOME", "GITHUB_WORKSPACE",
                      "RUNNER_OS", "BUILD_NUMBER", "APP_VERSION",
                      "APP_VERSION_CODE", "GRADLE", "SDKMANAGER"
                  ]):
                      selected.append(line)

              output.extend(["", "## Ortam özeti", "```text", "\n".join(selected[:360]), "```"])

          Path("summary.md").write_text("\n".join(output), encoding="utf-8")
          PY

      - name: Hata özetini GitHub Summary'ye yaz
        if: ${{ failure() }}
        shell: bash
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build log ve teşhis dosyalarını yükle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.APP_VERSION }}
          path: |
            early_diagnostics/**
            build_clean.log
            build_aab.log
            summary.md
            gradle_android_summary.md
            env_dump.txt
            sdk_list.txt
            play_console_upload/**
            dist_artifacts/play-console-belgeleri-${{ env.APP_VERSION }}.zip
          if-no-files-found: warn

      - name: Play Console AAB yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: play-console-aab-${{ env.APP_VERSION }}
          path: play_console_upload/*.aab
          if-no-files-found: error

      - name: Play Console belgeleri yükle
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: play-console-belgeleri-${{ env.APP_VERSION }}
          path: dist_artifacts/play-console-belgeleri-${{ env.APP_VERSION }}.zip
          if-no-files-found: error
